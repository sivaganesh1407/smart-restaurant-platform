# Server
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/restaurant_platform?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Optional: use H2 for local dev without MySQL
# spring.datasource.url=jdbc:h2:mem:restaurant;DB_CLOSE_DELAY=-1
# spring.datasource.driver-class-name=org.h2.Driver
# spring.h2.console.enabled=true
